<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 900" font-family="'Inter','DM Sans','Helvetica Neue',sans-serif">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="900" fill="#0d0c0a"/>

  <rect x="0" y="0" width="1280" height="32" fill="#15140f"/>
  <circle cx="18" cy="16" r="5" fill="#e2725b"/>
  <circle cx="36" cy="16" r="5" fill="#f0b557"/>
  <circle cx="54" cy="16" r="5" fill="#7fb069"/>
  <text x="640" y="20" font-size="11" fill="#5a5448" text-anchor="middle">localhost:3000 — Showfile Tracker — Easter Grace Community 2025</text>

  <g transform="translate(64,68)">
    <!-- Header (compressed) -->
    <circle cx="9" cy="9" r="6" fill="#f0b557"/>
    <text x="24" y="14" font-size="22" font-weight="700" fill="#f4ede0" letter-spacing="-0.4">Showfile Tracker</text>

    <!-- Tabs -->
    <g transform="translate(0,64)">
      <line x1="0" y1="44" x2="1152" y2="44" stroke="#2b281f"/>
      <text x="18" y="28" font-size="14" font-weight="600" fill="#f4ede0">Library</text>
      <rect x="0" y="43" width="74" height="2" fill="#f0b557"/>
      <text x="100" y="28" font-size="14" font-weight="500" fill="#8a8270">Events</text>
      <text x="170" y="28" font-size="14" font-weight="500" fill="#8a8270">+ Add</text>
      <text x="230" y="28" font-size="14" font-weight="500" fill="#8a8270">Settings</text>
    </g>

    <!-- Back link -->
    <text x="0" y="148" font-size="13" fill="#8a8270">← back to library</text>

    <!-- Header card -->
    <g transform="translate(0,168)" filter="url(#cardShadow)">
      <rect width="1152" height="180" rx="12" fill="#15140f" stroke="#2b281f"/>
      <!-- pill + meta -->
      <rect x="24" y="22" width="56" height="22" rx="11" fill="#5b9bd522" stroke="#5b9bd555"/>
      <circle cx="35" cy="33" r="3" fill="#5b9bd5"/>
      <text x="44" y="37" font-size="11" font-weight="600" fill="#5b9bd5">Eos</text>
      <text x="96" y="37" font-size="11" font-family="'JetBrains Mono',monospace" fill="#5a5448">created 2024-03-18 · updated 6 weeks ago</text>

      <!-- Title -->
      <text x="24" y="80" font-size="26" font-weight="700" fill="#f4ede0">Easter — Grace Community 2025</text>

      <!-- Sub fields -->
      <g transform="translate(24,108)" font-size="13">
        <text fill="#5a5448" x="0" y="0">client</text>
        <text fill="#d8d0bf" x="56" y="0">Grace Community Church</text>
        <text fill="#5a5448" x="0" y="22">venue</text>
        <text fill="#d8d0bf" x="56" y="22">Sanctuary, Bellevue WA · 1,400 cap</text>
        <text fill="#5a5448" x="0" y="44">rig</text>
        <text fill="#d8d0bf" x="56" y="44">house Eos Ti + 2x RPU · 12x Mac Aura, 16x ColorSource Spot, ETC Source Four LED2</text>
      </g>

      <!-- Storage + open -->
      <g transform="translate(770,22)">
        <rect width="358" height="34" rx="8" fill="#1d1b15" stroke="#2b281f"/>
        <circle cx="16" cy="17" r="3" fill="#7fb069"/>
        <text x="28" y="22" font-size="12" fill="#d8d0bf">Dropbox · /Shows/Eos/Grace/Easter25.esf3</text>
        <rect x="288" y="6" width="64" height="22" rx="6" fill="#f0b557"/>
        <text x="320" y="22" font-size="11" font-weight="700" fill="#1a1408" text-anchor="middle">↗ open</text>
      </g>
      <g transform="translate(770,66)">
        <rect width="170" height="28" rx="6" fill="transparent" stroke="#2b281f"/>
        <text x="14" y="19" font-size="12" fill="#8a8270">copy link</text>
        <rect x="178" width="86" height="28" rx="6" fill="transparent" stroke="#2b281f"/>
        <text x="221" y="19" font-size="12" fill="#8a8270" text-anchor="middle">archive</text>
        <rect x="272" width="86" height="28" rx="6" fill="transparent" stroke="#e2725b55"/>
        <text x="315" y="19" font-size="12" fill="#e2725b" text-anchor="middle">delete…</text>
      </g>
    </g>

    <!-- Two-column body: events (left), versions + notes (right) -->
    <g transform="translate(0,372)">

      <!-- EVENTS (left, 750w) -->
      <g>
        <text x="0" y="0" font-size="14" font-weight="600" fill="#f4ede0">Events <tspan fill="#5a5448" font-weight="400">· 4</tspan></text>
        <rect x="650" y="-16" width="100" height="28" rx="6" fill="#15140f" stroke="#2b281f"/>
        <text x="700" y="3" font-size="12" fill="#8a8270" text-anchor="middle">+ add event</text>

        <!-- Event rows -->
        <g transform="translate(0,20)" filter="url(#cardShadow)">
          <rect width="750" height="64" rx="10" fill="#15140f" stroke="#2b281f"/>
          <text x="18" y="22" font-size="11" font-family="'JetBrains Mono',monospace" fill="#f0b557">2025-04-20 · Sun</text>
          <text x="18" y="44" font-size="14" font-weight="600" fill="#f4ede0">Easter Sunday — 9am / 11am services</text>
          <text x="18" y="58" font-size="11" fill="#8a8270">Sanctuary, Bellevue WA</text>
          <rect x="650" y="22" width="78" height="22" rx="11" fill="#7fb06922" stroke="#7fb06955"/>
          <text x="689" y="37" font-size="11" font-weight="600" fill="#7fb069" text-anchor="middle">primary</text>
        </g>

        <g transform="translate(0,96)" filter="url(#cardShadow)">
          <rect width="750" height="64" rx="10" fill="#15140f" stroke="#2b281f"/>
          <text x="18" y="22" font-size="11" font-family="'JetBrains Mono',monospace" fill="#8a8270">2025-04-18 · Fri</text>
          <text x="18" y="44" font-size="14" font-weight="600" fill="#f4ede0">Good Friday service</text>
          <text x="18" y="58" font-size="11" fill="#8a8270">Sanctuary, Bellevue WA</text>
          <rect x="650" y="22" width="78" height="22" rx="11" fill="#7fb06922" stroke="#7fb06955"/>
          <text x="689" y="37" font-size="11" font-weight="600" fill="#7fb069" text-anchor="middle">primary</text>
        </g>

        <g transform="translate(0,172)" filter="url(#cardShadow)">
          <rect width="750" height="64" rx="10" fill="#15140f" stroke="#2b281f"/>
          <text x="18" y="22" font-size="11" font-family="'JetBrains Mono',monospace" fill="#8a8270">2025-04-17 · Thu</text>
          <text x="18" y="44" font-size="14" font-weight="600" fill="#f4ede0">Tech rehearsal — full run</text>
          <text x="18" y="58" font-size="11" fill="#8a8270">Sanctuary, Bellevue WA</text>
          <rect x="650" y="22" width="78" height="22" rx="11" fill="#f0b55722" stroke="#f0b55755"/>
          <text x="689" y="37" font-size="11" font-weight="600" fill="#f0b557" text-anchor="middle">backup</text>
        </g>

        <g transform="translate(0,248)" filter="url(#cardShadow)">
          <rect width="750" height="64" rx="10" fill="#15140f" stroke="#2b281f"/>
          <text x="18" y="22" font-size="11" font-family="'JetBrains Mono',monospace" fill="#8a8270">2025-04-13 · Sun</text>
          <text x="18" y="44" font-size="14" font-weight="600" fill="#f4ede0">Palm Sunday</text>
          <text x="18" y="58" font-size="11" fill="#8a8270">Sanctuary, Bellevue WA</text>
          <rect x="650" y="22" width="78" height="22" rx="11" fill="#7fb06922" stroke="#7fb06955"/>
          <text x="689" y="37" font-size="11" font-weight="600" fill="#7fb069" text-anchor="middle">primary</text>
        </g>
      </g>

      <!-- VERSIONS + NOTES (right, 380w) -->
      <g transform="translate(772,0)">
        <text x="0" y="0" font-size="14" font-weight="600" fill="#f4ede0">Versions <tspan fill="#5a5448" font-weight="400">· 3</tspan></text>
        <rect x="280" y="-16" width="100" height="28" rx="6" fill="#15140f" stroke="#2b281f"/>
        <text x="330" y="3" font-size="12" fill="#8a8270" text-anchor="middle">+ add version</text>

        <g transform="translate(0,20)" filter="url(#cardShadow)">
          <rect width="380" height="58" rx="10" fill="#15140f" stroke="#2b281f"/>
          <text x="16" y="22" font-size="13" font-weight="600" fill="#f4ede0">v1.2 — opening night</text>
          <text x="16" y="40" font-size="11" font-family="'JetBrains Mono',monospace" fill="#8a8270">2025-04-20 · current</text>
          <rect x="320" y="20" width="46" height="20" rx="6" fill="#1d1b15" stroke="#2b281f"/>
          <text x="343" y="34" font-size="11" font-weight="600" fill="#f0b557" text-anchor="middle">↗ open</text>
        </g>
        <g transform="translate(0,86)" filter="url(#cardShadow)">
          <rect width="380" height="58" rx="10" fill="#15140f" stroke="#2b281f"/>
          <text x="16" y="22" font-size="13" font-weight="600" fill="#f4ede0">v1.1 — added rain look</text>
          <text x="16" y="40" font-size="11" font-family="'JetBrains Mono',monospace" fill="#8a8270">2025-04-17</text>
          <rect x="320" y="20" width="46" height="20" rx="6" fill="#1d1b15" stroke="#2b281f"/>
          <text x="343" y="34" font-size="11" font-weight="600" fill="#f0b557" text-anchor="middle">↗ open</text>
        </g>
        <g transform="translate(0,152)" filter="url(#cardShadow)">
          <rect width="380" height="58" rx="10" fill="#15140f" stroke="#2b281f"/>
          <text x="16" y="22" font-size="13" font-weight="600" fill="#f4ede0">v1.0 — base from 2024</text>
          <text x="16" y="40" font-size="11" font-family="'JetBrains Mono',monospace" fill="#8a8270">2025-03-22</text>
        </g>

        <!-- Notes -->
        <text x="0" y="244" font-size="14" font-weight="600" fill="#f4ede0">Notes</text>
        <g transform="translate(0,260)" filter="url(#cardShadow)">
          <rect width="380" height="80" rx="10" fill="#15140f" stroke="#2b281f"/>
          <text x="16" y="22" font-size="12" fill="#d8d0bf">Pastor wants softer wash on 2nd verse</text>
          <text x="16" y="40" font-size="12" fill="#d8d0bf">of "How Great Thou Art". Macro 12 patched</text>
          <text x="16" y="58" font-size="12" fill="#d8d0bf">to GP slider 1. Backup on USB silver.</text>
        </g>
      </g>
    </g>
  </g>
</svg>
