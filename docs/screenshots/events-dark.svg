<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" font-family="'Inter','DM Sans','Helvetica Neue',sans-serif">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
